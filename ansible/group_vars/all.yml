---
# Ansible Group Variables for Local ThinkPad Deployment
# Protect sensitive keys using ansible-vault if deploying to remote nodes
# e.g., ansible-vault encrypt_string 'secret' --name 'groq_api_key'

# Target Installation directories on the local machine
install_dir: "{{ ansible_facts['env']['HOME'] }}/translator-pilot"

# API Keys (Provide via ansible-vault for real deployments)
groq_api_key: ""
gemini_api_key: ""
azure_speech_key: ""
venv_dir: "{{ install_dir }}/.venv"

# Provider Settings
stt_provider: "groq_whisper"
translate_provider: "gemini"
tts_provider: "azure_speech"

# Azure Speech Settings
azure_speech_region: "eastus"
azure_speech_voice: "zh-CN-XiaoxiaoNeural"

# Model Configurations
groq_model: "whisper-large-v3-turbo"
groq_llm_model: "llama-3.3-70b-versatile"
gemini_model: "gemini-3.5-flash"
gemini_tts_voice: "Kore"

# Retry Policies
retry_max_retries: 3
retry_base_delay: 1.0
retry_backoff_factor: 2.0
retry_max_delay: 30.0

# Align Settings
align_warning_threshold_ratio: 1.3

# Translation Prompt
llm_system_prompt: |
  You are a professional video translator translating a sequence of English audio transcripts into Chinese spoken dubbing.
  CRITICAL RULES:
  1. Maintain extreme context coherence. Read all segments together to understand the full meaning.
  2. The translations must be concise, natural, and match the tempo of spoken Chinese so they can be dubbed within the original time slots.
  3. Keep any tech/industry acronyms natural.
  4. Output exactly matching translated objects for each ID.
  5. CRITICAL: DO NOT merge translations across segments! You MUST strictly translate ONLY the exact English words present within each specific segment's 'text', even if that text is an incomplete fragment. Never pull meaning from the next segment into the current segment.

llm_user_prompt: |
  Please translate these segments and return ONLY JSON:
