---
# Ansible Group Variables for Local ThinkPad Deployment
# Protect sensitive keys using ansible-vault if deploying to remote nodes
# e.g., ansible-vault encrypt_string 'secret' --name 'groq_api_key'

# Target Installation directories on the local machine
install_dir: "{{ ansible_facts['env']['HOME'] }}/translator-pilot"

# API Keys (Provide via ansible-vault for real deployments)
venv_dir: "{{ install_dir }}/.venv"

# Provider Settings
stt_provider: "groq_whisper"
translate_provider: "nvidia_llm"
tts_provider: "sherpa_onnx"

# Azure Speech Settings
azure_speech_region: "eastus"
azure_speech_voice: "zh-CN-XiaoxiaoNeural"

# Model Configurations
groq_model: "whisper-large-v3-turbo"
groq_llm_model: "openai/gpt-oss-120b"
gemini_model: "gemini-3.5-flash"
gemini_tts_model: "gemini-3.1-flash-tts-preview"
gemini_tts_voice: "Kore"
nvidia_llm_model: "meta/llama-3.1-70b-instruct"
nvidia_tts_language: "zh-CN"
nvidia_tts_voice: "Magpie-Multilingual.ZH-CN.Aria"
nvidia_tts_sample_rate_hz: 44100

# Sherpa-ONNX Local TTS Settings (fully offline, no quota, no API key)
tts_sherpa_onnx_model_dir: "{{ install_dir }}/models/sherpa_onnx/matcha-icefall-zh-baker"
tts_sherpa_onnx_vocoder: "{{ install_dir }}/models/sherpa_onnx/vocos-22khz-univ.onnx"
tts_sherpa_onnx_num_threads: 4
tts_sherpa_onnx_volume_gain: 2.0

# Retry Policies
retry_max_retries: 3
retry_base_delay: 1.0
retry_backoff_factor: 2.0
retry_max_delay: 30.0

# Align Settings
align_warning_threshold_ratio: 1.3

# Translation Prompt
llm_system_prompt: |
  You are a professional video translator translating a sequence of English audio transcripts into Chinese spoken dubbing.
  CRITICAL RULES:
  1. The input is an array of segments. You must output an array of the EXACT same length with matching IDs.
  2. 1-TO-1 MAPPING: You MUST strictly translate ONLY the exact English words present within each specific segment's 'text'. 
  3. NO MERGING: DO NOT pull meaning or words from segment N+1 into segment N. If segment N is an incomplete sentence fragment, its Chinese translation MUST also be an incomplete fragment! Leave the rest of the sentence for the next segment.
  4. NATURAL CHINESE NUMBERS: Translate numbers into proper Chinese phrasing (e.g., "twelve thousand" -> "一万两千" not "十二千", "One thousand thousand" -> "一百万").
  5. Keep any tech/industry acronyms natural and keep the length concise to match original spoken tempo.

llm_user_prompt: |
  Please translate these segments and return ONLY JSON:
