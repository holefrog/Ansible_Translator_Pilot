<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translator Pilot - Results Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f111a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8f9fa;
            --text-secondary: #a0aabf;
            --accent-color: #3b82f6;
            --accent-hover: #60a5fa;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --error-color: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.15), transparent 25%);
            background-attachment: fixed;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            flex: 1;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0 0 10px 0;
            background: linear-gradient(135deg, #fff 0%, #a0aabf 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .segments-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .segment-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            gap: 24px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .segment-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--accent-color);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .segment-card:hover {
            transform: scale(1.01);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .segment-card:hover::before {
            opacity: 1;
        }

        .segment-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .text-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .source-text {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.5;
            font-weight: 400;
        }

        .target-text {
            color: var(--text-primary);
            font-size: 1.25rem;
            line-height: 1.5;
            font-weight: 500;
        }

        .segment-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.1);
        }

        .badge.warning {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning-color);
        }

        .badge.perfect {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success-color);
        }

        .play-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            padding-left: 24px;
            border-left: 1px solid var(--card-border);
        }

        .play-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .play-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.1);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.6);
        }

        .play-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            margin-left: 4px; /* visually center play icon */
        }

        .play-btn.playing {
            background: var(--error-color);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }

        .play-btn.playing svg {
            margin-left: 0;
        }

        .status-message {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .loader {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--accent-color);
            animation: spin 1s ease-in-out infinite;
        }

        .fallback-banner {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error-color);
            color: #fca5a5;
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.05rem;
            line-height: 1.5;
        }
        .fallback-banner strong {
            color: #f87171;
            font-size: 1.15rem;
            display: block;
            margin-bottom: 4px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .segment-card {
                flex-direction: column;
                gap: 16px;
            }
            .play-controls {
                border-left: none;
                border-top: 1px solid var(--card-border);
                padding-left: 0;
                padding-top: 16px;
            }
            .play-btn {
                width: 48px;
                height: 48px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Translator Pilot</h1>
        <div class="subtitle">Translation Results Viewer</div>
    </header>

    <div id="status" class="status-message">
        <div class="loader"></div>
        <p style="margin-top: 20px;">Loading pipeline results...</p>
    </div>

    <div id="content" style="display: none;">
        <div id="fallback-alert" class="fallback-banner" style="display: none;">
            <strong>⚠️ API 密钥配置问题，当前运行在演示（Fallback）模式！</strong>
            由于缺少有效的 API 密钥，程序无法调用真实的 AI 服务。<br>
            下面展示的是测试用的模拟文本和音频占位符，<span>点击播放不会有真实声音</span>。<br>
            请在部署配置中填写真实的 API Key 并重新运行。
        </div>

        <div class="dashboard">
            <div class="stat-card">
                <div class="stat-value" id="stat-segments">0</div>
                <div class="stat-label">Total Segments</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-duration">0.0s</div>
                <div class="stat-label">Total Audio Duration</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-warnings">0</div>
                <div class="stat-label">Alignment Warnings</div>
            </div>
        </div>

        <div class="segments-container" id="segments-container">
            <!-- Segments will be injected here via JS -->
        </div>
    </div>
</div>

<script>
    let currentAudio = null;
    let currentBtn = null;

    const playIcon = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
    const stopIcon = `<svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>`;

    async function loadData() {
        try {
            const response = await fetch('pipeline_result.json');
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            const data = await response.json();
            renderData(data);
        } catch (e) {
            console.error(e);
            document.getElementById('status').innerHTML = `
                <div style="color: var(--error-color);">
                    <svg style="width: 48px; height: 48px; margin-bottom: 16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    <p>Failed to load pipeline_result.json</p>
                    <p style="font-size: 0.9rem; color: var(--text-secondary); margin-top: 8px;">Ensure you run this via an HTTP server (e.g. python -m http.server)</p>
                </div>
            `;
        }
    }

    function renderData(data) {
        document.getElementById('status').style.display = 'none';
        document.getElementById('content').style.display = 'block';

        if (data.has_fallback) {
            document.getElementById('fallback-alert').style.display = 'block';
        }

        const segments = data.segments || [];
        const alignmentReport = data.alignmentReport || [];

        // Calculate stats
        document.getElementById('stat-segments').textContent = segments.length;
        
        let totalDuration = 0;
        let warnings = 0;
        
        const reportMap = {};
        alignmentReport.forEach(r => {
            reportMap[r.segment_id] = r;
            totalDuration += r.synthesized_duration;
            if (r.warning) warnings++;
        });

        document.getElementById('stat-duration').textContent = totalDuration.toFixed(1) + 's';
        document.getElementById('stat-warnings').textContent = warnings;
        
        const statWarningsEl = document.getElementById('stat-warnings');
        if (warnings > 0) {
            statWarningsEl.style.color = 'var(--warning-color)';
        } else {
            statWarningsEl.style.color = 'var(--success-color)';
        }

        const container = document.getElementById('segments-container');
        
        segments.forEach((seg, index) => {
            const report = reportMap[seg.segment_id] || {};
            const isWarning = report.warning;
            const ratioStr = report.ratio ? report.ratio.toFixed(2) + 'x' : 'N/A';
            const durationStr = report.synthesized_duration ? report.synthesized_duration.toFixed(2) + 's' : '0.0s';
            
            const badgeClass = isWarning ? 'warning' : 'perfect';
            const badgeText = isWarning ? 'Too Long' : 'Aligned';

            // We need to resolve the audio path relative to the viewer.html
            // The pipeline returns something like /output/segment_xxx.wav
            // Since viewer.html is IN output/, the relative path is just the filename.
            let audioFilename = seg.audio_path;
            if (audioFilename && audioFilename.includes('/')) {
                audioFilename = audioFilename.split('/').pop();
            }

            const card = document.createElement('div');
            card.className = 'segment-card';
            card.innerHTML = `
                <div class="segment-content">
                    <div class="text-group">
                        <div class="source-text">${seg.source_text || ''}</div>
                        <div class="target-text">${seg.target_text || ''}</div>
                    </div>
                    <div class="segment-meta">
                        <span>#${index + 1}</span>
                        <span>&bull;</span>
                        <span>${durationStr}</span>
                        <span>&bull;</span>
                        <span class="badge ${badgeClass}">${badgeText} (${ratioStr})</span>
                    </div>
                </div>
                <div class="play-controls">
                    <button class="play-btn" onclick="toggleAudio(this, '${audioFilename}')" title="Play Audio">
                        ${playIcon}
                    </button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function toggleAudio(btn, src) {
        if (!src || src === 'null' || src === 'undefined') {
            alert("No audio file available for this segment.");
            return;
        }

        // If clicking the same playing button, stop it
        if (currentAudio && currentBtn === btn) {
            stopCurrentAudio();
            return;
        }

        // If clicking a different button while playing, stop the old one
        if (currentAudio) {
            stopCurrentAudio();
        }

        // Play new audio
        currentBtn = btn;
        btn.classList.add('playing');
        btn.innerHTML = stopIcon;

        currentAudio = new Audio(src);
        currentAudio.play().catch(e => {
            console.error("Audio playback failed:", e);
            alert("Failed to play audio. The file might be missing or corrupted.");
            stopCurrentAudio();
        });

        currentAudio.onended = () => {
            stopCurrentAudio();
        };
    }

    function stopCurrentAudio() {
        if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
            currentAudio = null;
        }
        if (currentBtn) {
            currentBtn.classList.remove('playing');
            currentBtn.innerHTML = playIcon;
            currentBtn = null;
        }
    }

    // Initialize
    window.addEventListener('DOMContentLoaded', loadData);
</script>

</body>
</html>
