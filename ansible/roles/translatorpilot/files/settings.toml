# Translator-Pilot Settings Configured for local offline audio translation engine pipeline

[provider]
stt = "groq_whisper"
translate = "gemini"
tts = "azure_speech"

[stt.groq_whisper]
api_key = ""
model = "whisper-large-v3-turbo"

[stt.gemini]
api_key = ""
model = "gemini-3.5-flash"

[translate.gemini]
api_key = ""
model = "gemini-3.5-flash"

[tts.azure_speech]
api_key = ""
region = "eastus"
voice = "zh-CN-XiaoxiaoNeural"

[tts.gemini_tts]
voice = "Kore"

[retry]
max_retries = 3
base_delay = 1.0
backoff_factor = 2.0
max_delay = 30.0

[align]
warning_threshold_ratio = 1.3
