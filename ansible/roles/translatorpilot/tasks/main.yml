---
# Tasks for Translator Pilot Local Pipeline Deployment

- name: Create deployment target directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ install_dir }}"
    - "{{ install_dir }}/stt"
    - "{{ install_dir }}/translate"
    - "{{ install_dir }}/tts"
    - "{{ install_dir }}/output"
    - "{{ install_dir }}/models/sherpa_onnx"

- name: Create Python Virtual Environment (venv)
  command: "python3 -m venv {{ venv_dir }}"
  args:
    creates: "{{ venv_dir }}/bin/activate"

- name: Ensure pip is up to date inside virtual environment
  pip:
    name: pip
    state: latest
    virtualenv: "{{ venv_dir }}"

- name: Install required Python dependencies inside virtual environment
  pip:
    name:
      - requests
      - toml
    state: present
    virtualenv: "{{ venv_dir }}"

- name: Install sherpa-onnx Python package inside virtual environment
  pip:
    name: sherpa-onnx
    state: present
    virtualenv: "{{ venv_dir }}"
  when: tts_provider == "sherpa_onnx"

- name: Download sherpa-onnx Matcha-Icefall Chinese (baker voice) acoustic model archive
  get_url:
    url: "https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/matcha-icefall-zh-baker.tar.bz2"
    dest: "/tmp/matcha-icefall-zh-baker.tar.bz2"
  when: tts_provider == "sherpa_onnx"

- name: Extract Matcha-Icefall acoustic model into models directory
  unarchive:
    src: "/tmp/matcha-icefall-zh-baker.tar.bz2"
    dest: "{{ install_dir }}/models/sherpa_onnx/"
    remote_src: yes
    creates: "{{ tts_sherpa_onnx_model_dir }}/model-steps-3.onnx"
  when: tts_provider == "sherpa_onnx"

- name: Download sherpa-onnx univ vocoder (vocos-22khz)
  get_url:
    url: "https://github.com/k2-fsa/sherpa-onnx/releases/download/vocoder-models/vocos-22khz-univ.onnx"
    dest: "{{ tts_sherpa_onnx_vocoder }}"
  when: tts_provider == "sherpa_onnx"

- name: Deploy Core Python files
  copy:
    src: "{{ item }}"
    dest: "{{ install_dir }}/{{ item }}"
    mode: '0644'
  loop:
    - "contracts.py"
    - "retry.py"
    - "cache.py"
    - "stt/__init__.py"
    - "stt/base.py"
    - "stt/stt_groq_whisper.py"
    - "translate/__init__.py"
    - "translate/base.py"
    - "translate/translate_gemini.py"
    - "translate/translate_groq_llm.py"
    - "translate/translate_nvidia_llm.py"
    - "translate/translate_openai.py"
    - "translate/translate_mistral.py"
    - "tts/__init__.py"
    - "tts/base.py"
    - "tts/tts_azure_speech.py"
    - "tts/tts_gemini.py"
    - "tts/tts_nvidia_magpie.py"
    - "align_check.py"
    - "pipeline.py"
    - "tts/tts_sherpa_onnx.py"

- name: Render dynamically compiled settings.toml
  template:
    src: settings.toml.j2
    dest: "{{ install_dir }}/settings.toml"
    mode: '0640'

- name: Deploy Viewer Web UI
  copy:
    src: "viewer/"
    dest: "{{ install_dir }}/output/"
    mode: '0644'

- name: Provide integrated automated runner script (run.sh)
  template:
    src: "run.sh.j2"
    dest: "{{ install_dir }}/run.sh"
    mode: '0755'
