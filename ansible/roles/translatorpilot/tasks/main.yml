---
# Tasks for Translator Pilot Local Pipeline Deployment

- name: Create deployment target directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ install_dir }}"
    - "{{ install_dir }}/stt"
    - "{{ install_dir }}/translate"
    - "{{ install_dir }}/tts"
    - "{{ install_dir }}/output"

- name: Create Python Virtual Environment (venv)
  command: "python3 -m venv {{ venv_dir }}"
  args:
    creates: "{{ venv_dir }}/bin/activate"

- name: Ensure pip is up to date inside virtual environment
  pip:
    name: pip
    state: latest
    virtualenv: "{{ venv_dir }}"

- name: Install required Python dependencies inside virtual environment
  pip:
    name:
      - requests
      - toml
    state: present
    virtualenv: "{{ venv_dir }}"

- name: Deploy Core Python files
  copy:
    src: "{{ item }}"
    dest: "{{ install_dir }}/{{ item }}"
    mode: '0644'
  loop:
    - "contracts.py"
    - "retry.py"
    - "stt/__init__.py"
    - "stt/base.py"
    - "stt/stt_groq_whisper.py"
    - "translate/__init__.py"
    - "translate/base.py"
    - "translate/translate_gemini.py"
    - "translate/translate_groq_llm.py"
    - "tts/__init__.py"
    - "tts/base.py"
    - "tts/tts_azure_speech.py"
    - "align_check.py"
    - "pipeline.py"
  ignore_errors: yes  # Skip copy errors if source files are structured differently during local tests

- name: Render dynamically compiled settings.toml
  template:
    src: settings.toml.j2
    dest: "{{ install_dir }}/settings.toml"
    mode: '0640'

- name: Deploy Viewer Web UI
  copy:
    src: "viewer/"
    dest: "{{ install_dir }}/output/"
    mode: '0644'

- name: Provide integrated automated runner script (run.sh)
  template:
    src: "run.sh.j2"
    dest: "{{ install_dir }}/run.sh"
    mode: '0755'
